name: Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
          # aarch64-unknown-linux-gnu and x86_64-pc-windows-msvc disabled:
          # usearch/simsimd C++ build fails (missing arm_sve.h in cross container,
          # MSVC compilation errors). Re-enable when upstream usearch fixes these.

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          ARCHIVE=mdvdb-${VERSION}-${{ matrix.target }}.tar.gz
          tar -czf "$ARCHIVE" -C target/${{ matrix.target }}/release mdvdb
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" stroke="#00E5FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer cube -->
  <polygon points="16,2 28,9 28,23 16,30 4,23 4,9" />
  <line x1="16" y1="2" x2="16" y2="30" opacity="0.3" />
  <line x1="4" y1="9" x2="28" y2="23" opacity="0.3" />
  <line x1="28" y1="9" x2="4" y2="23" opacity="0.3" />
  <!-- Inner cube (tesseract projection) -->
  <polygon points="16,8 22,12 22,20 16,24 10,20 10,12" opacity="0.6" />
  <!-- Connections between inner and outer -->
  <line x1="16" y1="2" x2="16" y2="8" opacity="0.4" />
  <line x1="28" y1="9" x2="22" y2="12" opacity="0.4" />
  <line x1="28" y1="23" x2="22" y2="20" opacity="0.4" />
  <line x1="16" y1="30" x2="16" y2="24" opacity="0.4" />
  <line x1="4" y1="23" x2="10" y2="20" opacity="0.4" />
  <line x1="4" y1="9" x2="10" y2="12" opacity="0.4" />
</svg>
